<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4f46e5">
<title>My Quiz App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #eef2ff 0%, #fdf4ff 100%);
    min-height: 100vh;
    color: #1e1b4b;
  }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    background: #4f46e5; color: #fff; padding: 18px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 10px rgba(79,70,229,.3);
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header button {
    background: rgba(255,255,255,.18); border: none; color: #fff;
    padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  main { flex: 1; padding: 20px; padding-bottom: 40px; }
  .card {
    background: #fff; border-radius: 18px; padding: 22px;
    box-shadow: 0 4px 20px rgba(30,27,75,.08); margin-bottom: 16px;
  }
  .hidden { display: none !important; }

  /* Home */
  .big-btn {
    display: block; width: 100%; border: none; cursor: pointer;
    background: #4f46e5; color: #fff; font-size: 18px; font-weight: 700;
    padding: 18px; border-radius: 16px; margin-top: 14px;
    box-shadow: 0 6px 18px rgba(79,70,229,.35);
    transition: transform .1s;
  }
  .big-btn:active { transform: scale(.97); }
  .big-btn.secondary { background: #fff; color: #4f46e5; border: 2px solid #c7d2fe; box-shadow: none; }
  .stat-row { display: flex; gap: 12px; margin-top: 6px; }
  .stat {
    flex: 1; text-align: center; background: #eef2ff; border-radius: 14px; padding: 14px 6px;
  }
  .stat .num { font-size: 26px; font-weight: 800; color: #4f46e5; }
  .stat .lbl { font-size: 12px; color: #6366f1; margin-top: 2px; }
  .home-emoji { font-size: 54px; text-align: center; margin-bottom: 8px; }
  .home-title { text-align: center; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .home-sub { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 10px; }

  /* Quiz */
  .progress-wrap { background: #e0e7ff; border-radius: 99px; height: 10px; margin-bottom: 14px; overflow: hidden; }
  .progress-bar { background: #4f46e5; height: 100%; width: 0; border-radius: 99px; transition: width .3s; }
  .q-count { font-size: 13px; color: #6366f1; font-weight: 700; margin-bottom: 8px; }
  .q-text { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 18px; }
  .opt {
    display: block; width: 100%; text-align: left; cursor: pointer;
    background: #f5f6ff; border: 2px solid #e0e7ff; border-radius: 14px;
    padding: 15px 16px; font-size: 16px; font-weight: 600; color: #1e1b4b;
    margin-bottom: 10px; transition: all .15s;
  }
  .opt:active { transform: scale(.98); }
  .opt.correct { background: #dcfce7; border-color: #22c55e; color: #14532d; }
  .opt.wrong { background: #fee2e2; border-color: #ef4444; color: #7f1d1d; }
  .opt:disabled { cursor: default; opacity: .95; }
  .feedback { text-align: center; font-size: 17px; font-weight: 800; min-height: 26px; margin-top: 6px; }
  .feedback.good { color: #16a34a; }
  .feedback.bad { color: #dc2626; }

  /* Result */
  .result-emoji { font-size: 64px; text-align: center; }
  .result-score { font-size: 42px; font-weight: 800; text-align: center; color: #4f46e5; margin: 8px 0; }
  .result-msg { text-align: center; font-size: 17px; color: #374151; margin-bottom: 12px; }

  /* Manage questions */
  .q-item {
    background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .q-item .txt { flex: 1; font-weight: 600; }
  .q-item .ans { display: block; color: #16a34a; font-weight: 500; font-size: 13px; margin-top: 2px; }
  .del-btn {
    background: #fee2e2; color: #dc2626; border: none; border-radius: 10px;
    padding: 8px 12px; font-weight: 700; cursor: pointer; font-size: 13px;
  }
  label { display: block; font-size: 13px; font-weight: 700; color: #4b5563; margin: 12px 0 5px; }
  input[type=text] {
    width: 100%; padding: 13px 14px; border: 2px solid #e0e7ff; border-radius: 12px;
    font-size: 16px; outline: none; background: #fff;
  }
  input[type=text]:focus { border-color: #4f46e5; }
  .correct-pick { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .correct-pick button {
    flex: 1; min-width: 60px; padding: 10px; border-radius: 10px; border: 2px solid #e0e7ff;
    background: #fff; font-weight: 700; cursor: pointer; font-size: 14px; color: #4b5563;
  }
  .correct-pick button.sel { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .note { font-size: 13px; color: #6b7280; margin-top: 10px; text-align: center; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e1b4b; color: #fff; padding: 12px 22px; border-radius: 99px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;bottom:14px;left:14px;z-index:99999;background:#4f46e5;color:#fff;text-decoration:none;padding:10px 16px;border-radius:999px;font-family:sans-serif;font-size:13px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.35)">🏠 All Quizzes</a>
<div class="app">
  <header>
    <h1 id="headerTitle">🎯 My Quiz</h1>
    <button id="headerBtn" onclick="goHome()">Home</button>
  </header>

  <main>
    <!-- HOME -->
    <section id="screenHome">
      <div class="card">
        <div class="home-emoji">🧠</div>
        <div class="home-title">Ready to play?</div>
        <div class="home-sub" id="homeSub"></div>
        <div class="stat-row">
          <div class="stat"><div class="num" id="statQs">0</div><div class="lbl">Questions</div></div>
          <div class="stat"><div class="num" id="statBest">–</div><div class="lbl">Best Score</div></div>
          <div class="stat"><div class="num" id="statPlays">0</div><div class="lbl">Games Played</div></div>
        </div>
        <button class="big-btn" onclick="startQuiz()">▶ Start Quiz</button>
        <button class="big-btn secondary" onclick="showManage()">✏️ My Questions</button>
      </div>
    </section>

    <!-- QUIZ -->
    <section id="screenQuiz" class="hidden">
      <div class="card">
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="q-count" id="qCount"></div>
        <div class="q-text" id="qText"></div>
        <div id="optWrap"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </section>

    <!-- RESULT -->
    <section id="screenResult" class="hidden">
      <div class="card">
        <div class="result-emoji" id="resultEmoji">🏆</div>
        <div class="result-score" id="resultScore"></div>
        <div class="result-msg" id="resultMsg"></div>
        <button class="big-btn" onclick="startQuiz()">🔁 Play Again</button>
        <button class="big-btn secondary" onclick="goHome()">🏠 Home</button>
      </div>
    </section>

    <!-- MANAGE QUESTIONS -->
    <section id="screenManage" class="hidden">
      <div class="card">
        <div class="home-title" style="text-align:left;font-size:18px;">➕ Add a Question</div>
        <label>Question</label>
        <input type="text" id="inQ" placeholder="e.g. What is the capital of India?">
        <label>Option A</label>
        <input type="text" id="inA" placeholder="e.g. Mumbai">
        <label>Option B</label>
        <input type="text" id="inB" placeholder="e.g. New Delhi">
        <label>Option C</label>
        <input type="text" id="inC" placeholder="e.g. Kolkata">
        <label>Option D</label>
        <input type="text" id="inD" placeholder="e.g. Chennai">
        <label>Which option is correct?</label>
        <div class="correct-pick" id="correctPick">
          <button onclick="pickCorrect(0,this)">A</button>
          <button onclick="pickCorrect(1,this)">B</button>
          <button onclick="pickCorrect(2,this)">C</button>
          <button onclick="pickCorrect(3,this)">D</button>
        </div>
        <button class="big-btn" onclick="addQuestion()">💾 Save Question</button>
      </div>
      <div class="card">
        <div class="home-title" style="text-align:left;font-size:18px;margin-bottom:12px;">📋 Question List</div>
        <div id="qList"></div>
        <div class="note">Tip: your questions are saved on this device automatically.</div>
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
// ---------- Storage (safe: falls back to memory if blocked) ----------
var memStore = {};
function store(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { memStore[key] = val; }
}
function load(key, fallback) {
  try {
    var v = localStorage.getItem(key);
    return v === null ? (memStore[key] !== undefined ? memStore[key] : fallback) : JSON.parse(v);
  } catch(e) { return memStore[key] !== undefined ? memStore[key] : fallback; }
}

// ---------- Sample questions (replace with your own via "My Questions") ----------
var SAMPLES = [
  { q: "What is the capital of India?", opts: ["Mumbai", "New Delhi", "Kolkata", "Chennai"], correct: 1 },
  { q: "How many days are there in a leap year?", opts: ["364", "365", "366", "367"], correct: 2 },
  { q: "Which planet is known as the Red Planet?", opts: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1 },
  { q: "What is 7 × 8?", opts: ["54", "56", "64", "48"], correct: 1 },
  { q: "Which is the largest ocean in the world?", opts: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
  { q: "Who wrote the national anthem of India?", opts: ["Rabindranath Tagore", "Bankim Chandra", "Sarojini Naidu", "Premchand"], correct: 0 },
  { q: "Which animal is called the King of the Jungle?", opts: ["Tiger", "Elephant", "Lion", "Leopard"], correct: 2 },
  { q: "How many colours are there in a rainbow?", opts: ["5", "6", "7", "8"], correct: 2 },
  { q: "Which gas do plants take in from the air?", opts: ["Oxygen", "Carbon dioxide", "Nitrogen", "Hydrogen"], correct: 1 },
  { q: "What is the fastest land animal?", opts: ["Horse", "Cheetah", "Greyhound", "Kangaroo"], correct: 1 }
];

var questions = load("quizQuestions", null);
if (!questions || !questions.length) { questions = SAMPLES.slice(); store("quizQuestions", questions); }

var bestScore = load("quizBest", null);
var playCount = load("quizPlays", 0);

// ---------- Screens ----------
var screens = ["screenHome", "screenQuiz", "screenResult", "screenManage"];
function show(id) {
  screens.forEach(function(s){ document.getElementById(s).classList.toggle("hidden", s !== id); });
  window.scrollTo(0, 0);
}
function goHome() {
  document.getElementById("statQs").textContent = questions.length;
  document.getElementById("statBest").textContent = bestScore === null ? "–" : bestScore + "%";
  document.getElementById("statPlays").textContent = playCount;
  document.getElementById("homeSub").textContent = questions.length + " questions waiting for you";
  show("screenHome");
}

// ---------- Quiz flow ----------
var order = [], idx = 0, score = 0, locked = false;
function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function startQuiz() {
  if (!questions.length) { toast("Add some questions first!"); showManage(); return; }
  order = shuffle(questions.map(function(_, i){ return i; }));
  idx = 0; score = 0;
  show("screenQuiz");
  renderQuestion();
}
function renderQuestion() {
  locked = false;
  var q = questions[order[idx]];
  document.getElementById("progressBar").style.width = (idx / order.length * 100) + "%";
  document.getElementById("qCount").textContent = "Question " + (idx + 1) + " of " + order.length;
  document.getElementById("qText").textContent = q.q;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";
  var wrap = document.getElementById("optWrap");
  wrap.innerHTML = "";
  q.opts.forEach(function(opt, i) {
    var b = document.createElement("button");
    b.className = "opt";
    b.textContent = opt;
    b.onclick = function(){ answer(i, b); };
    wrap.appendChild(b);
  });
}
function answer(i, btn) {
  if (locked) return;
  locked = true;
  var q = questions[order[idx]];
  var fb = document.getElementById("feedback");
  var opts = document.querySelectorAll("#optWrap .opt");
  opts.forEach(function(o){ o.disabled = true; });
  if (i === q.correct) {
    score++;
    btn.classList.add("correct");
    fb.textContent = "✅ Correct!";
    fb.classList.add("good");
  } else {
    btn.classList.add("wrong");
    opts[q.correct].classList.add("correct");
    fb.textContent = "❌ Answer: " + q.opts[q.correct];
    fb.classList.add("bad");
  }
  setTimeout(function() {
    idx++;
    if (idx < order.length) renderQuestion();
    else finish();
  }, 1300);
}
function finish() {
  var pct = Math.round(score / order.length * 100);
  playCount++; store("quizPlays", playCount);
  if (bestScore === null || pct > bestScore) { bestScore = pct; store("quizBest", bestScore); }
  document.getElementById("resultScore").textContent = score + " / " + order.length;
  var emoji = pct === 100 ? "🏆" : pct >= 70 ? "🎉" : pct >= 40 ? "👍" : "💪";
  var msg = pct === 100 ? "Perfect score! Amazing!" :
            pct >= 70 ? "Great job! " + pct + "% correct." :
            pct >= 40 ? "Good try! " + pct + "% correct." :
            "Keep practising — you'll get there!";
  document.getElementById("resultEmoji").textContent = emoji;
  document.getElementById("resultMsg").textContent = msg;
  show("screenResult");
}

// ---------- Manage questions ----------
var pickedCorrect = -1;
function showManage() {
  renderList();
  show("screenManage");
}
function pickCorrect(i, btn) {
  pickedCorrect = i;
  document.querySelectorAll("#correctPick button").forEach(function(b){ b.classList.remove("sel"); });
  btn.classList.add("sel");
}
function addQuestion() {
  var q = document.getElementById("inQ").value.trim();
  var opts = [
    document.getElementById("inA").value.trim(),
    document.getElementById("inB").value.trim(),
    document.getElementById("inC").value.trim(),
    document.getElementById("inD").value.trim()
  ];
  if (!q) { toast("Please type the question"); return; }
  if (opts.some(function(o){ return !o; })) { toast("Please fill all 4 options"); return; }
  if (pickedCorrect < 0) { toast("Pick the correct option (A/B/C/D)"); return; }
  questions.push({ q: q, opts: opts, correct: pickedCorrect });
  store("quizQuestions", questions);
  ["inQ","inA","inB","inC","inD"].forEach(function(id){ document.getElementById(id).value = ""; });
  pickedCorrect = -1;
  document.querySelectorAll("#correctPick button").forEach(function(b){ b.classList.remove("sel"); });
  renderList();
  toast("Question saved! ✅");
}
function deleteQuestion(i) {
  questions.splice(i, 1);
  store("quizQuestions", questions);
  renderList();
  toast("Deleted");
}
function renderList() {
  var list = document.getElementById("qList");
  list.innerHTML = "";
  if (!questions.length) {
    list.innerHTML = '<div class="note">No questions yet — add your first one above!</div>';
    return;
  }
  questions.forEach(function(q, i) {
    var d = document.createElement("div");
    d.className = "q-item";
    var span = document.createElement("div");
    span.className = "txt";
    span.textContent = (i + 1) + ". " + q.q;
    var ans = document.createElement("span");
    ans.className = "ans";
    ans.textContent = "✓ " + q.opts[q.correct];
    span.appendChild(ans);
    var del = document.createElement("button");
    del.className = "del-btn";
    del.textContent = "Delete";
    del.onclick = function(){ deleteQuestion(i); };
    d.appendChild(span);
    d.appendChild(del);
    list.appendChild(d);
  });
}

// ---------- Toast ----------
var toastTimer;
function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

goHome();
</script>
</body>
</html>
